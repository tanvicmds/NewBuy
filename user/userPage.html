<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewBuy</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="./user_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

<body>

            <img src="../assets/hero_carousel/slide1.png" alt="">
            <img src="../assets/hero_carousel/slide2.png" alt="">

            <img src="../assets/hero_carousel/slide4.png" alt="">
            <img src="../assets/hero_carousel/slide5.png" alt="">

    <section class="underUSDArea">

    </section>

            <img src="" alt="truck">

        </div>
        <div class="whyCard">
            <img src="" alt="lock">

        </div>
        <div class="whyCard">
            <img src="" alt="reset">
            <p>Easy Returns</p>
        </div>
        <div class="whyCard">
            <img src="" alt="phone">
            <p>24/7 Customer Support</p>
        </div>
    </section>
    <footer>
        <section class="footer-about"></section>
        <section class="footer-quick-links"></section>
        <section class="footer-contact-us"></section>
        <section class="footer-newsletter"></section>
    </footer>
